name: CI

on:
  push:
    branches:
      - main
      - consolidate/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - core

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync workspace + member extras
        run: uv sync --all-packages --extra=dev

      - name: Run ${{ matrix.member }} tests
        working-directory: packages/${{ matrix.member }}
        run: uv run pytest

      - name: Ruff (full repo)
        run: uv run ruff check .

      - name: mypy on ${{ matrix.member }}
        run: uv run mypy packages/${{ matrix.member }}/src

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --extra=dev

      - name: Build all member wheels
        run: |
          for m in core mcp gui; do
            echo "::group::Building $m"
            (cd packages/$m && uv build --out-dir $PWD/dist)
            echo "::endgroup::"
          done
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/*/dist/*.whl
            packages/*/dist/*.tar.gz
