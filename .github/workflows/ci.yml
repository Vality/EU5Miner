name: CI

on:
  push:
    branches:
      - main
      - consolidate/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - core

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync workspace + member extras
        run: (cd packages/core && uv sync --extra=dev)

      - name: Run ${{ matrix.member }} tests
        working-directory: packages/${{ matrix.member }}
        run: uv run pytest

      - name: Ruff (full repo)
        run: uv run ruff check .

      - name: mypy on ${{ matrix.member }}
        run: uv run mypy packages/${{ matrix.member }}/src

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: (cd packages/core && uv sync --extra=dev)

      - name: Build the unified wheel
        run: |
          echo "::group::Building core"
          (cd packages/core && uv build --out-dir $PWD/dist)
          echo "::endgroup::
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/*/dist/*.whl
            packages/*/dist/*.tar.gz
