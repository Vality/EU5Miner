name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --extra=dev

      - name: Build all member wheels
        run: |
          for m in core mcp gui; do
            echo "::group::Building $m"
            (cd packages/$m && uv build --out-dir $PWD/dist)
            echo "::endgroup::"
          done

      - name: Attach all wheels and sdists to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*/dist/*.whl
            packages/*/dist/*.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: |
            packages/*/dist/*.whl
            packages/*/dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist
      - name: Publish eu5miner to PyPI (Trusted Publishing via OIDC)
        env:
          UV_TRUSTED_PUBLISHING: "true"
        run: uv publish dist/core/dist/eu5miner-*.whl dist/core/dist/eu5miner-*.tar.gz
