[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "eu5miner-mcp"
version = "0.7.0"
description = "Public-preview MCP shell built on the EU5Miner library"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "Val G and GitHub Copilot" },
]
dependencies = [
  "eu5miner>=0.7,<0.8",
  "mcp>=1.28.1,<2",
]

[project.optional-dependencies]
dev = [
  "mypy>=2.2.0",
  "pytest>=9.1.1",
  "ruff>=0.15.21",
]

[project.scripts]
eu5miner-mcp = "eu5miner_mcp.cli:main"

[tool.uv.sources]
eu5miner = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/eu5miner_mcp"]

[tool.hatch.build.targets.wheel.force-include]
"src/eu5miner_mcp/__main__.py" = "eu5miner_mcp/__main__.py"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "SIM",
]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["eu5miner_mcp"]
warn_unused_configs = true
