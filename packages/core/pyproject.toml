[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "eu5miner"
version = "0.8.0"
description = "Text-first parsing and modding support library for Europa Universalis V data files, with optional MCP server and Kivy desktop GUI"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "Val G and GitHub Copilot" },
]
dependencies = []

[project.optional-dependencies]
dev = [
  "mypy>=1.15.0",
  "pytest>=9.1.1",
  "pytest-timeout>=2.3.1",
  "ruff>=0.15.21",
]
mcp = ["mcp>=1.28.1,<2"]
gui = ["kivy>=2.3,<3"]
all = ["mcp>=1.28.1,<2", "kivy>=2.3,<3"]

[project.scripts]
eu5miner           = "eu5miner.cli:main"
eu5miner-mcp       = "eu5miner.mcp.cli:main"
eu5miner-gui       = "eu5miner.gui.cli:main"
eu5miner-gui-shell = "eu5miner.gui.cli:shell_main"

[tool.hatch.build.targets.wheel]
packages = ["src/eu5miner"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--strict-markers"]
markers = [
  "broad: optional broad real-install coverage and integration sweep",
  "timeout: per-test timeout override for performance-sensitive parser tests",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "SIM",
]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["eu5miner"]
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["kivy.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["eu5miner.gui.desktop.widgets.*"]
disallow_subclassing_any = false
warn_return_any = false

[[tool.mypy.overrides]]
module = ["eu5miner.gui.desktop.bootstrap"]
disallow_subclassing_any = false
